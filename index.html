<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Рулетка Stars</title>
    <!-- ИСПРАВЛЕНО: Подключен корректный скрипт Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121225;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .balance-container {
            font-size: 18px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .roulette-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #f5b041;
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #9b59b6 270deg 360deg);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform: rotate(0deg);
        }
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 200px;
            margin: 0 auto;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        #spin-btn { background: #f5b041; color: #121225; }
        #deposit-btn { background: #3498db; color: #fff; }
        #withdraw-btn { background: #2ecc71; color: #fff; }
        button:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

    <!-- ИСПРАВЛЕНО: Убран некорректный экранированный символ в заголовке -->
    <h1>Звездная Рулетка ⭐</h1>
    
    <div class="balance-container">
        Баланс: <span id="balance-val">0</span> Спинов
    </div>

    <div class="roulette-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
    </div>

    <div class="btn-group">
        <button id="spin-btn" disabled>КРУТИТЬ! (1 спин) 🎰</button>
        <button id="deposit-btn">Купить Спины за ⭐</button>
        <button id="withdraw-btn">Вывести Выигрыш 🪙</button>
    </div>

<script>
    // ИСПРАВЛЕНО: Безопасная проверка инициализации во избежание падения скрипта вне ТГ
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    
    if (tg) {
        tg.ready();
        tg.expand();
    } else {
        console.warn("Приложение запущено вне Telegram");
    }

    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spin-btn');
    const depositBtn = document.getElementById('deposit-btn');
    const withdrawBtn = document.getElementById('withdraw-btn');
    const balanceVal = document.getElementById('balance-val');

    let spinsBalance = 0; 
    let currentRotation = 0; 

    // Покупка звезд (Донат)
    depositBtn.addEventListener('click', function() {
        alert("Здесь откроется окно оплаты Telegram Stars!");
        spinsBalance += 3; 
        updateUI();
    });

    // Вывод средств
    withdrawBtn.addEventListener('click', function() {
        const wallet = prompt("Введите ваш TON кошелек для вывода выигрыша:");
        if (wallet) {
            if (tg) {
                tg.sendData(JSON.stringify({ action: "withdraw", wallet: wallet }));
                tg.close();
            } else {
                alert("Данные для вывода (эмуляция): " + wallet);
            }
        }
    });

    // Логика вращения
    spinBtn.addEventListener('click', function() {
        if (spinsBalance <= 0) return;
        
        spinsBalance--;
        updateUI();
        
        spinBtn.disabled = true;
        depositBtn.disabled = true;
        withdrawBtn.disabled = true;

        const randomDegrees = Math.floor(Math.random() * 360);
        currentRotation += (5 * 360) + randomDegrees;
        wheel.style.transform = "rotate(" + currentRotation + "deg)";

        setTimeout(function() {
            alert("🎰 Вращение завершено!");
            depositBtn.disabled = false;
            withdrawBtn.disabled = false;
            updateUI();
        }, 4000);
    });

    function updateUI() {
        balanceVal.innerText = spinsBalance;
        spinBtn.disabled = (spinsBalance <= 0);
    }
</script>
</body>
</html>
