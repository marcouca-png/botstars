<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Рулетка</title>
    <!-- Подключаем Telegram API, чтобы сайт умел общаться с ботом -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        /* Стили для круга рулетки */
        .roulette-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 30px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #f5b041;
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #9b59b6 270deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); /* Плавное торможение колеса */
        }
        /* Стрелка указателя */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #fff;
            z-index: 10;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f5b041;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 176, 65, 0.4);
        }
        button:disabled {
            background-color: #555;
            color: #aaa;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>Звездная Рулетка</h1>
    <p>Испытай удачу и выиграй TON!</p>

    <div class="roulette-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
    </div>

    <button id="spin-btn">КРУТИТЬ! 🎰</button>

    <script>
        // Инициализируем окно Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');

        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true; // Выключаем кнопку, чтобы не жали дважды

            // Генерируем случайный угол вращения (минимум 5 полных оборотов + случайный сектор)
            const randomDegrees = Math.floor(Math.random() * 360) + 1800; 
            
            // Крутим колесо визуально
            wheel.style.transform = `rotate(${randomDegrees}deg)`;

            // Ждем 4 секунды (пока идет анимация вращения)
            setTimeout(() => {
                alert("Поздравляем! Вы выиграли приз!");
                
                // ⚠️ ВАЖНО: Отправляем данные обратно в ваш Python-бот
                // Бот получит этот текст и зачислит баланс пользователю
                tg.sendData("user_spun_the_wheel"); 
                
                // Закрываем мини-приложение
                tg.close();
            }, 4000);
        });
    </script>
</body>
</html>
