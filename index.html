<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Рулетка</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121225;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .roulette-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 30px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #f5b041;
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #9b59b6 270deg 360deg);
            /* Упростили анимацию торможения */
            transition: transform 4s ease-out; 
        }
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #f5b041;
            color: #121225;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Звездная Рулетка</h1>
    <p>Нажми кнопку ниже!</p>

    <div class="roulette-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
    </div>

    <button id="spin-btn">КРУТИТЬ! 🎰</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');

        spinBtn.addEventListener('click', function() {
            // Сразу отключаем кнопку, чтобы зафиксировать клик
            spinBtn.disabled = true;
            spinBtn.innerText = "КРУТИТСЯ...";

            // Генерируем фиксированный сильный поворот (выиграет случайный сектор)
            const degrees = 2000 + Math.floor(Math.random() * 360);
            
            // Вращаем колесо
            wheel.style.transform = "rotate(" + degrees + "deg)";

            // Через 4 секунды показываем результат
            setTimeout(function() {
                alert("🎉 Выигрыш зафиксирован!");
                try {
                    tg.sendData("user_spun_the_wheel");
                } catch(e) {
                    console.log("Ошибка отправки данных в бот");
                }
                tg.close();
            }, 4000);
        });
    </script>
</body>
</html>
