<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звездная Рулетка</title>
    <!-- Правильное подключение библиотеки Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121225;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .roulette-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 30px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #f5b041;
            /* Конический градиент секторов */
            background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #9b59b6 270deg 360deg);
            /* Анимация вращения через CSS-транзишн */
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform: rotate(0deg);
        }
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ffffff;
            z-index: 10;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #f5b041;
            color: #121225;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        button:disabled {
            background: #444;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Звездная Рулетка</h1>
    <p>Нажми кнопку ниже!</p>

    <div class="roulette-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
    </div>

    <button id="spin-btn">КРУТИТЬ! 🎰</button>

    <script>
        // Инициализируем Telegram WebApp
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready(); // Сообщаем Telegram, что приложение готово
            tg.expand(); // Разворачиваем на весь экран
        }

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        let currentRotation = 0;

        spinBtn.addEventListener('click', function() {
            // Отключаем кнопку, чтобы избежать повторных спам-кликов
            spinBtn.disabled = true;
            spinBtn.innerText = "КРУТИТСЯ...";

            // Рассчитываем случайный угол (минимум 5 полных оборотов + случайный сектор)
            const randomDegrees = Math.floor(Math.random() * 360);
            const extraSpins = 5 * 360; 
            currentRotation += extraSpins + randomDegrees;

            // Запускаем вращение колеса
            wheel.style.transform = "rotate(" + currentRotation + "deg)";

            // Через 4 секунды (когда анимация закончится)
            setTimeout(function() {
                alert("🎉 Колесо остановилось! Выигрыш зафиксирован!");
                
                // Проверяем, запущено ли в ТГ, и закрываем
                if (tg) {
                    tg.close();
                } else {
                    // Если тестируете в обычном браузере — просто вернем кнопку в рабочее состояние
                    spinBtn.disabled = false;
                    spinBtn.innerText = "КРУТИТЬ! 🎰";
                }
            }, 4000);
        });
    </script>
</body>
</html>
